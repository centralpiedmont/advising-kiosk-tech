name: Deploy kiosk to GitHub Pages

# Serves the prebuilt static frontend in public/ via GitHub Pages.
# The kiosk's interactive funnel, QR degree sheets, and info-session links
# all work as static content. The "Email this" feature POSTs to the Node
# server.js /email endpoint, which Pages does not run — that capture only
# works on the Raspberry Pi deployment.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
